name: portfolio
description: "Rahul Kumar Sah Portfolio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0
  marqueer: ^2.5.0
  url_launcher: ^6.3.2
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.1.0
  smooth_page_indicator: ^2.0.1
  expandable_page_view: ^1.3.0
  emailjs: ^4.0.0
  http: ^1.6.0
  web: ^1.1.1
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/